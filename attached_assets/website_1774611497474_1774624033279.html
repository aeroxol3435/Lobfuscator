for(let i=0;i<len;i++){
out+=chars[Math.floor(Math.random()*chars.length)];
}

}

function toBase64(str){
return btoa(unescape(encodeURIComponent(str)));
}

function toOctal(str){
let r="";
for(let i=0;i<str.length;i++){
r+="\\"+str.charCodeAt(i).toString(8);
}
return r;
}

function splitIntoThree(str){
let p=Math.floor(str.length/3);
return[
str.substring(0,p),
str.substring(p,p*2),
str.substring(p*2)
];
}
